<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collectible Market Signals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="page-header">
    <h1>Collectible Marketplace Signals</h1>
    <p class="tagline">Interpretation support, not recommendation — make sense of incomplete data and stay in the loop.</p>
  </header>

  <div class="main-layout">
    <div class="left-panel">
      <div id="data-controls"></div>
      <div id="warning"></div>
      <div id="chart"></div>

      <div id="table-toggle-section">
        <button id="toggle-table" class="toggle_button" type="button">
          Show raw transaction table
        </button>
      </div>
      <div id="raw-table" class="hidden"></div>
    </div>

    <div class="right-panel">
      <div id="interpretation"></div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script src="js/runtime-config.js"></script>
  <script type="module" src="js/main.js"></script>

</body>

</html>
